name: Publish ACR Image

on:
  push:
    branches:
      - main
    paths:
      - '.dockerignore'
      - '.github/workflows/publish-acr.yml'
      - 'Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - 'assets/**'
      - 'deploy/docker-entrypoint.sh'
      
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: sudorouter.azurecr.io
  IMAGE_NAME: sub2api
  DEPLOY_HOST: 104.208.90.4
  DEPLOY_USER: azureuser
  DEPLOY_PATH: /data/sub2api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Asia/Shanghai' date +'%Y_%m%d_%H%M')" >>$GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.DATE }}
          build-args: |
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY,ACR_USERNAME,ACR_PASSWORD,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "$ACR_PASSWORD" | docker login "$REGISTRY" --username "$ACR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            for i in $(seq 1 30); do
              status="$(docker inspect --format='{{.State.Health.Status}}' sub2api 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                echo "sub2api health check passed"
                exit 0
              fi
              echo "Waiting for sub2api health check ($i/30): ${status:-unknown}"
              sleep 5
            done

            docker compose logs --tail=100 sub2api
            exit 1
