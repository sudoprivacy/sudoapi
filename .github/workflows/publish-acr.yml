name: Publish ACR Image

on:
  push:
    tags:
      - '*'
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to push instead of latest; leave empty to use latest'
        required: false
        type: string
      deploy_host:
        description: 'Azure VM IP to deploy to; Use "default" for DEPLOY_HOST variable, leave empty to skip deployment'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: sudorouter.azurecr.io
  IMAGE_NAME: sub2api
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Asia/Shanghai' date +'%Y_%m%d_%H%M')" >>$GITHUB_OUTPUT

      - name: Resolve image tags
        id: image_tags
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_IMAGE_TAG" ]; then
            primary_tag="$INPUT_IMAGE_TAG"
          else
            primary_tag="latest"
          fi

          {
            echo "tags<<EOF"
            echo "$REGISTRY/$IMAGE_NAME:$primary_tag"
            echo "$REGISTRY/$IMAGE_NAME:${{ steps.date.outputs.DATE }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          build-args: |
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve deploy config
        id: deploy
        env:
          INPUT_DEPLOY_HOST: ${{ github.event.inputs.deploy_host }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_DEPLOY_HOST" ]; then
              deploy_host=""
            elif [ "$INPUT_DEPLOY_HOST" = "default" ]; then
              deploy_host="$DEPLOY_HOST"
            else
              deploy_host="$INPUT_DEPLOY_HOST"
            fi
          else
            deploy_host="$DEPLOY_HOST"
          fi

          echo "host=$deploy_host" >> "$GITHUB_OUTPUT"

          if [ -z "$deploy_host" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Azure VM
        if: ${{ steps.deploy.outputs.should_deploy == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ steps.deploy.outputs.host }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY,ACR_USERNAME,ACR_PASSWORD,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "$ACR_PASSWORD" | docker login "$REGISTRY" --username "$ACR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            for i in $(seq 1 30); do
              status="$(docker inspect --format='{{.State.Health.Status}}' sub2api 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                echo "sub2api health check passed"
                exit 0
              fi
              echo "Waiting for sub2api health check ($i/30): ${status:-unknown}"
              sleep 5
            done

            docker compose logs --tail=100 sub2api
            exit 1
